<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Très Carré</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
    }

    .carre {
      width: 300px;
      height: 300px;
      background: #000000;
    }

    .legende {
      margin-top: 32px;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: #000000;
    }
  </style>
</head>
<body>
  <div class="carre"></div>
  <p class="legende">C'est très carré tout ça.</p>
</body>
</html>
